<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR LUDO - खेलें और जीतें</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #040913; color: white; text-align: center; }
        .hero { padding: 50px 20px; background: linear-gradient(to bottom, #154b99, #040913); }
        .logo { height: 100px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #ffd05a; }
        p { color: #9fb0d1; line-height: 1.6; }
        .btn-play { 
            display: inline-block; padding: 15px 40px; background: #2f7bff; 
            color: white; text-decoration: none; border-radius: 50px; 
            font-weight: bold; font-size: 18px; margin-top: 20px;
            box-shadow: 0 4px 15px rgba(47, 123, 255, 0.4);
        }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 30px; }
        .f-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 14px; }

<body>

    <div class="hero">
        <img src="logo.png" class="logo" alt="SR Ludo Logo">
        <h1>Welcome to SR LUDO Arena</h1>

        <a href="app.html" class="btn-play">LOGIN TO PLAY ➔</a>
    </div>

    <div class="features">
        <div class="f-card">✅ 100% Safe & Secure</div>
        <div class="f-card">🚀 Instant Support</div>
        <div class="f-card">🎮 Classic Gameplay</div>
        <div class="f-card">🏆 Daily Tournaments</div>
    </div>

    <div style="padding: 20px; font-size: 10px; color: #555;">
        <a href="privacy.html" style="color: #9fb0d1;">Privacy Policy</a> | 
        <a href="terms.html" style="color: #9fb0d1;">Terms of Service</a>
        <p>18+ Only. Not for Assam, Odisha, and restricted states.</p>
    </div>

</body>
</html>
